<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<style>
      .wrapper.index-page {
      background-image: url('./img/banner-main.png');
      background-position: top;
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
    }
    .wrapper.index-page::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.2);
      width: 100%;
      height: 100%;
    }
    .page-list {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 20px;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding-top: 140px;
    }
    .page-list-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 20px;
      width: 100%;
    }
    .index-title {
      width: 100%;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-size: 48px;
      color: #ffffff;
      margin: 0 auto;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    .page-list-column a {
      width: 100%;      
      color: #ffffff;
      padding: 20px 12px;
      border-radius: 5px;
      position: relative;
      transition: 0.3s;


      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);

      /* Дополнительное оформление */
      border: 2px solid rgba(255, 255, 255, 1);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);

    }
    .page-list-column a:hover {
      transform: translateY(-2px);
    }
</style>
<body>

  <div class="wrapper index-page">

    <h1  class="index-title">Index Page</h1>

    <div class="page-list">
      <div class="page-list-column">
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="ptoduct.html">Product</a>
        <a href="shops.html">Stores</a>
        <a href="contacts.html">Contacts</a>
        <a href="rules.html">Rules</a>
      </div>
      <div class="page-list-column">
        <a href="delivery.html">Delivery</a>
        <a href="wish.html">Wish list</a>
        <a href="basket.html">Basket</a>
        <a href="order.html">Order</a>
        <a href="404.html">404</a>
      </div>
    </div>

  </div>
  
</body>
</html>
