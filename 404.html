<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка 404 — Страница не найдена</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 10rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -5px;
      color: #ffffff10;
      position: relative;
    }

    h1::after {
      content: "404";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      color: #fff;
      text-shadow: 0 0 10px #ffffff40;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    p {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #aaa;
    }

    a {
      margin-top: 30px;
      display: inline-block;
      text-decoration: none;
      color: #fff;
      border: 1px solid #fff;
      padding: 10px 25px;
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    a:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Похоже, этой страницы не существует или она была удалена.</p>
  <a href="/">Вернуться на главную</a>
</body>
</html>
